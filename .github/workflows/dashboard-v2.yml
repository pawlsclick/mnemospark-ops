name: dashboard_v2

on:
  push:
    paths:
      - "dashboard_v2/**"
      - ".github/workflows/dashboard-v2.yml"
  pull_request:
    paths:
      - "dashboard_v2/**"
      - ".github/workflows/dashboard-v2.yml"

defaults:
  run:
    working-directory: dashboard_v2

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      # Opt into Node 24 for Actions JS until it is the default (GitHub deprecation of Node 20 runners).
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: dashboard_v2/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run codegen:check
      - run: npm run build
