name: dashboard_v2

on:
  push:
    paths:
      - "dashboard_v2/**"
      - ".github/workflows/dashboard-v2.yml"
  pull_request:
    paths:
      - "dashboard_v2/**"
      - ".github/workflows/dashboard-v2.yml"

defaults:
  run:
    working-directory: dashboard_v2

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: dashboard_v2/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run codegen:check
      - run: npm run build
