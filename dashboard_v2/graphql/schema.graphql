"""Dashboard GraphQL API (align with mnemospark-backend services/dashboard_graphql)."""
type Health {
  ok: Boolean!
}

type RevenueSummary {
  walletAddress: String!
  confirmedPaymentCount: Int!
  totalAmount: String!
}

type Query {
  health: Health!
  revenueSummary(walletAddress: String!): RevenueSummary!
}
